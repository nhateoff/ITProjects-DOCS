name: Rollback MkDocs (Deploy specific ref)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Commit SHA oder Tag (z.B. a1b2c3d oder v1.0.0). Leer lassen = main"
        required: false
        default: "main"
      strict:
        description: "MkDocs strict mode aktivieren (true/false)"
        required: false
        default: "true"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository at ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MkDocs + deps
        run: pip install mkdocs pyyaml

      # Falls du mkdocs.generated.yml nutzt:
      - name: Generate mkdocs config from feature flags
        run: python scripts/build_mkdocs_config.py

      - name: Build site
        run: |
          if [ "${{ inputs.strict }}" = "true" ]; then
            mkdocs build --strict -f mkdocs.generated.yml
          else
            mkdocs build -f mkdocs.generated.yml
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
