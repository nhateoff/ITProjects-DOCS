site_name: ITProjects-DOCS
site_description: Centralized documentation repository for IT projects (guides, concepts, templates)
site_author: nhateoff

# Where your markdown lives
docs_dir: docs

# Helpful repo links
repo_name: nhateoff/ITProjects-DOCS
repo_url: https://github.com/nhateoff/ITProjects-DOCS
edit_uri: edit/main/docs/

theme:
  name: mkdocs

plugins:
  - search

markdown_extensions:
  - toc:
      permalink: true
  - admonition
  - tables

nav:
  - Home: index.md

  - Guides:
      - Create GitHub Wiki (Step-by-step): guides/guide_create_wiki.md
      - Rollback MkDocs (Step-by-step): guides/guide_rollback_mkdocs.md

  - Concepts:
      - Wiki Pages (GitHub): concepts/wiki-pages.md
      - Centralized Repository: concepts/centralized-repo.md
      - Searchable Documentation: concepts/searchable-documentation.md
      - Community Contribution enabled: concepts/community-contribution-enabled.md

      - Deployment Strategies — Feature Flags: concepts/flag-features.md
      - Deployment Strategies — Rollback Capabilities: concepts/rollback-capabilities.md
      - Deployment Strategies — Phased Deployment: concepts/phased-deployment-approaches.md

  # Optional: keep your existing HTML demo pages accessible
  - Web Demos (Optional):
      - Demo Home (Markdown): index.md
      - Demo Example (HTML): example1.html
